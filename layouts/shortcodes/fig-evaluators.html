<figure class="diagram">
  <svg viewBox="0 0 680 600" role="img" aria-label="Two ways to grade a feature without letting the coding agent grade itself: a weak verifier running a locked ground-truth script, or a strong evaluator that acts through the UI but never reads the code.">
    <defs>
      <marker id="ah-eval" viewBox="0 0 10 10" refX="7" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
        <path d="M0,0 L10,5 L0,10 z" class="dgm-muted" />
      </marker>
    </defs>

    <!-- banner -->
    <rect x="20" y="10" width="640" height="46" rx="8" class="dgm-node-accent" />
    <text x="340" y="39" text-anchor="middle" font-size="18" class="dgm-accent">Never let an agent grade itself</text>

    <!-- Panel A -->
    <rect x="20" y="78" width="640" height="232" rx="12" class="dgm-panel" />
    <text x="40" y="112" font-size="15.5" class="dgm-text-strong">1  ·  Weak verifier, fresh context</text>

    <rect x="40" y="150" width="176" height="50" rx="9" class="dgm-node" />
    <text x="128" y="180" text-anchor="middle" font-size="13.5" class="dgm-text">Feature under test</text>
    <path d="M 220 175 L 254 175" class="dgm-arrow" marker-end="url(#ah-eval)" />

    <rect x="258" y="150" width="180" height="50" rx="9" class="dgm-node-accent" />
    <text x="348" y="180" text-anchor="middle" font-size="13.5" class="dgm-accent">&#128274; Ground-truth script</text>
    <text x="348" y="222" text-anchor="middle" font-size="11.5" class="dgm-muted">you write it  ·  the agent cannot edit it</text>
    <path d="M 442 175 L 476 175" class="dgm-arrow" marker-end="url(#ah-eval)" />

    <rect x="480" y="150" width="160" height="50" rx="9" class="dgm-node" />
    <text x="560" y="180" text-anchor="middle" font-size="14" class="dgm-text-strong">pass / fail</text>

    <text x="40" y="278" font-size="13" class="dgm-muted">The script is the ground truth. The verifier only reads its result, so it can be weak.</text>

    <!-- Panel B -->
    <rect x="20" y="330" width="640" height="252" rx="12" class="dgm-panel" />
    <text x="40" y="364" font-size="15.5" class="dgm-text-strong">2  ·  Strong evaluator, acts but never reads the code</text>

    <rect x="40" y="404" width="176" height="58" rx="9" class="dgm-node" />
    <text x="128" y="430" text-anchor="middle" font-size="14" class="dgm-text-strong">Evaluator</text>
    <text x="128" y="449" text-anchor="middle" font-size="11.5" class="dgm-muted">fresh context</text>

    <text x="256" y="426" text-anchor="middle" font-size="11.5" class="dgm-muted">drives</text>
    <path d="M 220 433 L 292 433" class="dgm-arrow" marker-end="url(#ah-eval)" />

    <rect x="296" y="404" width="200" height="58" rx="9" class="dgm-node-accent" />
    <text x="396" y="430" text-anchor="middle" font-size="14" class="dgm-accent">App UI</text>
    <text x="396" y="449" text-anchor="middle" font-size="11.5" class="dgm-muted">tags / shortcuts, not pixels</text>

    <!-- barrier to the code -->
    <text x="558" y="392" text-anchor="middle" font-size="11.5" class="dgm-danger-text">no code access</text>
    <line x1="520" y1="400" x2="520" y2="466" class="dgm-danger" stroke-width="2" stroke-dasharray="5 4" />
    <rect x="548" y="404" width="92" height="58" rx="9" class="dgm-node" />
    <text x="594" y="430" text-anchor="middle" font-size="13" class="dgm-text">code</text>
    <text x="594" y="449" text-anchor="middle" font-size="13" class="dgm-text">/ repo</text>

    <text x="40" y="520" font-size="13" class="dgm-muted">Let it read the code and the author biases the judge through</text>
    <text x="40" y="540" font-size="13" class="dgm-muted">naming, comments, and structure. So it acts, and never reads.</text>
  </svg>
  <figcaption>Two ways to grade a feature without letting the coding agent grade its own work.</figcaption>
</figure>
